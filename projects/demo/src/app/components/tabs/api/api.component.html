<div class="flex flex-col gap-ids-container-gap-32 w-full justify-start">
  <h2>Properties</h2>
  <app-prop-table [config]="[_propConfig]" />
  @if(_methodConfig.length > 0)
  {
    <h2>Methods</h2>
    <div class="flex flex-col gap-ids-container-gap-8">

      @for (config of _methodConfig; track config; let i = $index) {
        @if (_methodTitles[i]) {
          <h3 >{{ _methodTitles[i] }}</h3>
        }
        <app-method-table class="pb-ids-container-padding-12" [config]="config"/>
      }
    </div>
  }
</div>
