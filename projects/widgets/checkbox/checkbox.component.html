<div class="ids-checkbox__input-wrapper">
  <div class="ids-checkbox__touch-target" (click)="onTouchTargetClick()"></div>
  <input
    #inputEl
    type="checkbox"
    [class.ids-checkbox--selected]="_isChecked()"
    [id]="_inputId()"
    [disabled]="disabled()"
    [attr.aria-checked]="_isIndeterminate() ? 'mixed' : _isChecked()"
    [attr.aria-label]="ariaLabel() || null"
    [attr.aria-labelledby]="ariaLabelledby()"
    [attr.aria-describedby]="ariaDescribedby()"
    [attr.aria-readonly]="readonly()"
    [checked]="_isChecked()"
    [indeterminate]="_isIndeterminate()"
    [name]="name()"
    [required]="_hasRequiredValidator()"
    [tabIndex]="!_isFocusable() ? -1 : tabIndex()"
    [value]="_nativeValue()"
    (blur)="onBlur()"
    (click)="onInputClick()"
    (change)="$event.stopPropagation()"
  />
  <div class="ids-checkbox__icon" aria-hidden="true">
    @if (_isIndeterminate()) {
      <ids-icon fontIcon="remove" aria-hidden="true" />
    }
    @if (_isChecked()) {
      <ids-icon fontIcon="done" aria-hidden="true" />
    }
  </div>
</div>

<div class="ids-checkbox__label-wrapper" (click)="onInputClick()" >
  <div class="ids-checkbox__label-container">
    @if (_hasRequiredValidator()) {
      <span class="ids-form-field__required-marker"></span>
    }
    <label class="ids-checkbox__label" [for]="_inputId()" (click)="$event.stopPropagation()">
      <ng-content />
    </label>
  </div>
  @let messages = displayedMessages;
  @if (messages) {
    <div class="ids-checkbox__message-container">
      @switch (messages) {
        @case ("error") {
          <ng-content select="ids-error-message" />
        }
        @case ("hint") {
          <ng-content select="ids-hint-message" />
        }
      }
    </div>
  }
</div>
