<div class="flex flex-col gap-ids-container-gap-32 w-full justify-start">
  <div class="flex justify-between items-center">
    <ids-chip appearance="outlined" variant="surface" size="dense"> Updated {{ _lastModified() }} </ids-chip>
  </div>
  <h2>Properties</h2>
  <app-prop-table [config]="[_propConfig]" />
  @if (_methodConfig.length > 0) {
    <h2>Methods</h2>
    @for (config of _methodConfig; track config) {
      <app-method-table [config]="config" />
    }
  }
</div>
