<ng-template #content>
  <div
    class="ids-tab-body-content"
    [attr.role]="'tabpanel'"
    [id]="panelId()"
    [attr.aria-labelledby]="label()"
  >
    <ng-content />
  </div>
</ng-template>

<ng-template #prefixContent>
  <ng-content select="[prefixContent]" />
</ng-template>

<ng-template #suffixContent>
  <ng-content select="[suffixContent]" />
</ng-template>
