<app-content-hero [heroData]="heroData()" />

<div class="flex flex-col items-start gap-12 py-10 px-8 contents-container">
  <div class="flex flex-col w-full max-w-[1170px] items-start gap-ids-container-gap-16">
    <div class="self-stretch text-justify" [innerHTML]="heroData().description"></div>
  </div>
  <ids-card class="self-center flex justify-center items-center hero-img" orientation="horizontal">
    <img alt="" [src]="heroData().imageUrlLight" />
  </ids-card>

  <div class="flex flex-col w-full gap-8">
    @for (block of contentBlocks(); track $index) {
      @switch (block.type) {
        @case ("heading") {
          <h2 class="text-2xl font-bold">{{ block.heading }}</h2>
        }

        @case ("card") {
          <app-content-card [contentCardData]="block" [showCaption]="true"/>
        }
      }
    }
  </div>
</div>
