@if (_shouldRender()) {
  <div class="ids-message__prefix">
    <ng-content select="[idsMessagePrefix]">
      <ids-icon aria-hidden="true" fontIcon="alert-circle-outline" variant="error" />
    </ng-content>
  </div>

  <div class="ids-message__text">
    @if (_useValidationMode()) {
      @let validationError = _validationError();

      @if (validationError) {
        {{ _getValidationErrorMessage(validationError.message) }}
      }
    } @else {
      <ng-content />
    }
  </div>

  @if (suffixes().length) {
    <div class="ids-message__suffix">
      <ng-content select="[idsMessageSuffix]" />
    </div>
  }
}
