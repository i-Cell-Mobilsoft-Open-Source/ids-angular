<div class="ids-radio__input-wrapper">
  <div class="ids-radio__touch-target" (click)="_touchTargetClick()"></div>
  <input
    #input
    class="ids-radio__native-control"
    type="radio"
    [id]="_inputId()"
    [checked]="selected()"
    [disabled]="_isDisabled()"
    [attr.name]="_name()"
    [attr.value]="value()"
    [required]="_required()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-checked]="_ariaChecked()"
    [attr.aria-invalid]="_hasErrorState() ? true : null"
    (blur)="_onBlur()"
    (change)="onChange()"
  />
  <div class="ids-radio__inner-circle" (click)="_innerCircleClick()"></div>
</div>

<div class="ids-radio__label-wrapper" (click)="_touchTargetClick()">
  <div class="ids-radio__label-container">
    <label class="ids-radio__label" [for]="_inputId()">
      <ng-content />
    </label>
  </div>
  @if (hintMessage().length > 0) {
    <ng-content select="ids-hint-message"/>
  }
</div>
